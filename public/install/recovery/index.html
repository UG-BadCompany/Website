<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Setup Recovery</title><link rel="stylesheet" href="/assets/styles.css"></head><body><main class="shell"><section class="card"><h1>Installation Recovery</h1><p>Recovery mode is independent from the full installer and checks static files, functions, database health, migrations, module registry, bootstrap config, and environment status.</p><div id="checks" class="grid two"><div class="card">Running diagnostics…</div></div><a class="btn" href="/install/">Resume Setup</a> <button class="btn secondary" onclick="copyReport()">Copy Diagnostic Report</button></section></main><script>let report={url:location.href,userAgent:navigator.userAgent,timestamp:new Date().toISOString()};async function run(){const checks=[];async function c(name,url){try{const r=await fetch(url,{cache:'no-store'}); const j=await r.json().catch(()=>({})); checks.push({name,ok:r.ok,json:j});}catch(e){checks.push({name,ok:false,error:e.message})}} await c('Install Status','/api/install-status'); await c('Install Health','/api/install/health'); await c('Draft','/api/install/draft'); await c('Module Registry','/generated/module-registry.json'); await c('Bootstrap','/config/bootstrap.json'); report.checks=checks; document.getElementById('checks').innerHTML=checks.map(x=>`<article class="card"><h3>${x.ok?'🟢':'🟡'} ${x.name}</h3><pre>${JSON.stringify(x.json||x.error,null,2)}</pre></article>`).join('')} function copyReport(){navigator.clipboard?.writeText(JSON.stringify(report,null,2))} run();</script></body></html>
