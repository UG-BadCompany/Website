<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Install Platform</title><script type="module">import{loadBootstrapTheme}from'/assets/js/core/theme-client.js';loadBootstrapTheme();</script><link rel="stylesheet" href="/assets/css/design-system.css"><style>.installer{display:grid;grid-template-columns:260px minmax(0,1fr) 320px;gap:1rem;min-height:100vh;padding:1rem}.steps{position:sticky;top:1rem;height:calc(100vh - 2rem);overflow:auto}.step{display:block;width:100%;text-align:left;margin:.25rem 0}.step.active{outline:3px solid color-mix(in srgb,var(--primary) 25%,transparent)}.progress{height:10px;background:var(--color-border);border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;background:var(--primary)}.field{margin:.75rem 0}.env-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}.env-card{display:grid;grid-template-columns:1fr auto;gap:.7rem;align-items:end}.color-row{display:grid;grid-template-columns:1fr 56px 120px auto;gap:.5rem;align-items:center}.preview{border:1px solid var(--color-border);border-radius:18px;overflow:hidden}.preview-head,.preview-side,.preview-mobile{padding:.7rem;background:var(--color-surface);border-bottom:1px solid var(--color-border)}@media(max-width:1000px){.installer{grid-template-columns:1fr}.steps,.help{position:static;height:auto}}</style></head><body><main id="app" class="installer"></main><script type="module" src="/assets/js/public/installer.js"></script></body></html>
