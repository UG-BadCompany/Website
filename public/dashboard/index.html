<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | T&A Contracting</title>
  <link rel="stylesheet" href="/styles/site.css">
</head>
<body>
  <header class="nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="brand" href="/" aria-label="T&A Contracting home">
        <img class="brand-logo" src="https://raw.githubusercontent.com/UG-BadCompany/images/refs/heads/main/website%20logos/logo3.png" alt="T&A Contracting logo">
        <span>T&A Contracting</span>
      </a>
      <nav class="nav-links" aria-label="Primary links">
        <a href="/">Home</a>
        <a href="/admin/ai-quotes/">AI Drafts</a>
        <button class="btn" type="button" data-logout>Logout</button>
      </nav>
    </div>
  </header>

  <main class="wrap page-shell">
    <section class="page-header">
      <div class="eyebrow">Dashboard</div>
      <h1>Requests, quotes, and jobs.</h1>
      <p data-dashboard-welcome>Checking session…</p>
    </section>

    <section class="dashboard-grid">
      <div class="dashboard-card" data-last-draft>
        <h3>Recent AI Draft</h3>
        <p>No recent AI quote draft in this browser session yet.</p>
      </div>
      <div class="dashboard-card">
        <h3>Quick actions</h3>
        <div class="action-row">
          <a class="btn btn-primary" href="/#estimate">New Request</a>
          <a class="btn" href="/admin/ai-quotes/">AI Drafts</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/site.js" defer></script>
  <script src="/js/dashboard-auth.js" defer></script>
  <script src="/js/dashboard.js" defer></script>
</body>
</html>
