<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="/assets/install-guard.js"></script><link rel="stylesheet" href="/assets/theme.css"><title>Magic Login</title></head><body><main style="max-width:520px;margin:4rem auto"><div class="card"><h1>Magic Login</h1><p>Passwordless login supports owner, admin, worker, and client accounts with secure single-use tokens.</p><input id="email" type="email" placeholder="you@example.com"><button id="send" style="margin-top:1rem">Send magic link</button><p id="msg" class="muted"></p></div></main><script src="/assets/platform.js"></script><script>send.onclick=async()=>{const j=await(await fetch('/api/auth/magic-login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:email.value})})).json();msg.textContent=j.message+(j.devLoginPath?' Setup link: '+j.devLoginPath:'')}</script></body></html>
