<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magic Link Login | T&A Contracting</title>
  <link rel="stylesheet" href="/styles/site.css">
</head>
<body>
  <header class="nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="brand" href="/" aria-label="T&A Contracting home">
        <img class="brand-logo" src="https://raw.githubusercontent.com/UG-BadCompany/images/refs/heads/main/website%20logos/logo3.png" alt="T&A Contracting logo">
        <span>T&A Contracting</span>
      </a>
      <nav class="nav-links" aria-label="Primary links">
        <a href="/">Home</a>
        <a class="btn btn-primary" href="/#estimate">Request Estimate</a>
      </nav>
    </div>
  </header>

  <main class="wrap page-shell">
    <section class="page-header">
      <div class="eyebrow">Secure Login</div>
      <h1>Magic link login.</h1>
      <p>Enter your email and we’ll send a secure sign-in link. No password needed.</p>
    </section>

    <section class="form-card">
      <form data-magic-link-form>
        <div class="field">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <input type="hidden" name="next" value="/dashboard/" data-next-field>
        <p class="form-note">Use the same email you used for your estimate request.</p>
        <button class="btn btn-primary" type="submit">Send Magic Link</button>
        <p class="form-status" data-magic-link-status role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="/js/site.js" defer></script>
  <script src="/js/magic-link-login.js" defer></script>
</body>
</html>
