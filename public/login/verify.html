<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signing In | T&A Contracting</title>
  <link rel="stylesheet" href="/styles/site.css">

<style>
/* Unified homepage/dashboard visual system */
:root{--dash-bg: #070a0f}
body{background:linear-gradient(135deg, #070a0f 0%, #111827 48%, #251109 100%)}
.nav {background: rgba(7,10,15,.80)}
/* Shared polished top-right navigation controls */
</style>
  <link rel="stylesheet" href="/assets/mobile-field-ux.css">
  <link rel="stylesheet" href="/assets/mobile-saas-overhaul.css">
</head>
<body>
  <main class="wrap page-shell">
    <section class="form-card">
      <h1>Signing you in…</h1>
      <p class="form-status" data-verify-status>Verifying magic link.</p>
    </section>
  </main>

  <script>
    (async () => {
      const status = document.querySelector('[data-verify-status]');
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const next = params.get('next') || '/dashboard/';

      const setStatus = (message, state = '') => {
        status.textContent = message;
        status.dataset.state = state;
      };

      if (!token) {
        setStatus('Missing magic link token.', 'error');
        return;
      }

      try {
        const response = await fetch('/.netlify/functions/verify-magic-link', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ token }),
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok || result.ok === false) {
          throw new Error(result.message || 'Magic link could not be verified.');
        }

        try {
          localStorage.setItem('taSessionUser', JSON.stringify(result.user || {}));
        } catch {}

        setStatus('Signed in. Redirecting…', 'success');
        window.location.assign(next.startsWith('/') ? next : '/dashboard/');
      } catch (error) {
        setStatus(error.message || 'Magic link verification failed.', 'error');
      }
    })();
  </script>
</body>
</html>
