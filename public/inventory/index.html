<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory | T&A Contracting</title>
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/UG-BadCompany/images/refs/heads/main/website%20logos/favicon/favicon.ico">
  <meta name="description" content="Admin inventory tracking for T&A Contracting materials, tools, stock levels, suppliers, and adjustments.">
  <style>
    :root { --ink:#f8fafc; --muted:#cbd5e1; --line:rgba(255,255,255,.15); --rust:#f97316; --rust-dark:#c2410c; --copper:#f59e0b; --cream:#0f172a; --white:#fff; --green:#22c55e; --shadow:0 24px 80px rgba(0,0,0,.28); --surface:rgba(255,255,255,.085); --surface-strong:rgba(255,255,255,.14); }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 82% 8%,rgba(249,115,22,.24),transparent 30rem),radial-gradient(circle at 12% 16%,rgba(245,158,11,.16),transparent 26rem),linear-gradient(180deg,#070a0f,#111827 48%,#0f172a)} a{text-decoration:none;color:inherit}.wrap{width:min(1180px,calc(100% - 36px));margin:0 auto}.nav{border-bottom:1px solid var(--line);background:rgba(7,10,15,.82);backdrop-filter:blur(18px);position:sticky;top:0;z-index:2}.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:14px 0}.brand{display:flex;align-items:center;gap:12px;font-weight:950;text-transform:uppercase;letter-spacing:.03em}.brand img{width:92px;height:auto;aspect-ratio:1/1;object-fit:contain}.nav-links{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 18px;border-radius:999px;border:1px solid var(--line);font-weight:900;background:rgba(255,255,255,.08);color:var(--ink);cursor:pointer}.btn-primary{background:linear-gradient(135deg,var(--rust),var(--rust-dark));color:#fff;border-color:transparent}.btn-danger{background:rgba(153,27,27,.22);color:#fecaca;border-color:rgba(248,113,113,.34)}.account-status{display:inline-flex;align-items:center;min-height:42px;padding:0 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:850}.hero{padding:44px 0 22px}.hero-card{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(280px,.9fr);gap:22px;align-items:end;padding:clamp(24px,5vw,46px);border:1px solid var(--line);border-radius:32px;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.06));box-shadow:var(--shadow)}.eyebrow{display:inline-flex;margin-bottom:14px;padding:8px 12px;border-radius:999px;background:rgba(249,115,22,.14);color:#fdba74;font-size:.78rem;font-weight:950;letter-spacing:.08em;text-transform:uppercase}h1{margin:0;font-size:clamp(2.7rem,6vw,5.1rem);line-height:.96;letter-spacing:-.07em}p{color:var(--muted);font-weight:650;line-height:1.65}.status{margin:18px 0 0;padding:14px 16px;border:1px solid var(--line);border-left:4px solid var(--copper);border-radius:18px;background:rgba(255,255,255,.07);color:var(--muted);font-weight:850}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin:24px 0}.card,.inventory-card{position:relative;overflow:clip;padding:22px;border:1px solid var(--line);border-radius:24px;background:var(--surface);box-shadow:0 18px 45px rgba(0,0,0,.18)}.card::before,.inventory-card::before{content:"";position:absolute;inset:0 0 auto;height:4px;background:linear-gradient(90deg,var(--rust),var(--copper));opacity:.9}.metric{font-size:2rem;font-weight:950;color:#fb923c}.form{display:grid;gap:12px;margin:24px 0;padding:18px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.07)}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.form label{display:grid;gap:7px;color:var(--muted);font-size:.86rem;font-weight:900}.form input,.form select,.form textarea{width:100%;min-height:48px;border:1px solid var(--line);border-radius:14px;padding:11px 12px;font:inherit;color:var(--ink);background:rgba(15,23,42,.82)}.form textarea{min-height:110px;resize:vertical}.full{grid-column:1/-1}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.inventory-list{display:grid;gap:14px;margin:24px 0 70px}.badge{display:inline-flex;margin-bottom:9px;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:#fdba74;font-weight:950;text-transform:capitalize}.meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-weight:850;font-size:.9rem}.meta span{padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line)}.inventory-card strong{display:block;margin-bottom:8px;font-size:1.1rem}.inventory-card p{margin:10px 0 0}.hidden{display:none!important}@media(max-width:840px){.hero-card,.grid,.form-grid{grid-template-columns:1fr}.brand img{width:82px}}


    /* Unified homepage/dashboard visual system */
    :root {
      --dash-bg: #070a0f;
      --dash-surface: rgba(255,255,255,.085);
      --dash-surface-strong: rgba(255,255,255,.14);
      --dash-line: rgba(255,255,255,.15);
      --dash-text: #f8fafc;
      --dash-muted: #cbd5e1;
      --dash-orange: #f97316;
      --dash-amber: #f59e0b;
      --dash-green: #22c55e;
      --dash-blue: #60a5fa;
    }

    body {
      color: var(--dash-text);
      background:
        radial-gradient(circle at 12% -8%, rgba(249,115,22,.34), transparent 34rem),
        radial-gradient(circle at 92% 0%, rgba(96,165,250,.16), transparent 28rem),
        linear-gradient(135deg, #070a0f 0%, #111827 48%, #251109 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.7), transparent 82%);
    }

    .wrap,
    .nav-inner,
    .section { width: min(1200px, calc(100% - 36px)); }

    .nav {
      background: rgba(7,10,15,.80);
      border-bottom-color: var(--dash-line);
      box-shadow: 0 18px 50px rgba(0,0,0,.22);
    }

    .brand,
    .nav-links,
    h1,
    h2,
    h3,
    label,
    .card strong,
    .benefit strong,
    .service-card strong,
    .workflow-card strong { color: var(--dash-text); }

    .brand img,
    .brand-logo {
      width: clamp(86px, 8vw, 118px);
      height: auto;
      padding: 0;
      background: transparent;
      box-shadow: none;
      object-fit: contain;
    }

    .btn {
      color: var(--dash-text);
      border-color: var(--dash-line);
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--dash-orange), #b93815);
      box-shadow: 0 16px 42px rgba(249,115,22,.28);
    }

    .btn-soft,
    .btn-secondary { background: rgba(255,255,255,.10); color: var(--dash-text); }

    .hero-card,
    .portal-hero,
    .dashboard-hero {
      border-color: var(--dash-line);
      border-radius: 36px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,.055)),
        radial-gradient(circle at 78% 22%, rgba(249,115,22,.24), transparent 24rem);
      box-shadow: 0 34px 100px rgba(0,0,0,.34);
      backdrop-filter: blur(22px);
    }

    .hero-card,
    .portal-hero { grid-template-columns: minmax(0, 1fr) minmax(260px, .55fr); }

    .eyebrow {
      color: #ffd7a6;
      background: rgba(241,166,74,.14);
      border-color: rgba(255,255,255,.18);
      font-weight: 1000;
      letter-spacing: .10em;
    }

    p,
    .footer,
    .session-status,
    .account-status,
    .card p,
    .benefit p,
    .service-card p,
    .workflow-card p,
    .list li,
    .form-note,
    .estimate-list li { color: var(--dash-muted); }

    .logo-panel,
    .login-logo,
    .hero-media {
      border-color: rgba(255,255,255,.24);
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255,246,234,.95), rgba(255,250,243,.82)),
        radial-gradient(circle at 50% 12%, rgba(216,135,52,.18), transparent 18rem);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.75), 0 24px 70px rgba(0,0,0,.18);
    }

    .logo-panel img,
    .login-logo img,
    .hero-logo {
      width: min(100%, 430px);
      padding: 18px;
      background: transparent;
      box-shadow: none;
      filter: drop-shadow(0 26px 48px rgba(0,0,0,.34));
    }

    .card,
    .benefit,
    .login-card,
    .notice,
    .service-card,
    .workflow-card,
    .estimate-shell,
    .estimate-form,
    .client-request-form,
    .admin-request,
    .client-request,
    .client-quote,
    .client-property,
    .worker-job,
    .admin-assignment,
    .admin-request-modal-panel {
      color: var(--dash-text);
      border-color: var(--dash-line);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.055));
      box-shadow: 0 24px 70px rgba(0,0,0,.24);
      backdrop-filter: blur(18px);
    }

    input,
    select,
    textarea {
      color: var(--dash-text);
      background: rgba(7,10,15,.64);
      border-color: var(--dash-line);
    }

    input::placeholder,
    textarea::placeholder { color: #94a3b8; }

    .metric { color: #fdba74; }
    .footer { border-top-color: var(--dash-line); }

    html[data-theme="light"] body {
      color: #111827;
      background:
        radial-gradient(circle at 10% -8%, rgba(249,115,22,.16), transparent 32rem),
        radial-gradient(circle at 92% 0%, rgba(216,135,52,.14), transparent 28rem),
        linear-gradient(135deg, #fffaf2 0%, #ffffff 52%, #f7eadc 100%);
    }

    html[data-theme="light"] .nav { background: rgba(255,250,244,.88); border-bottom-color: rgba(17,17,17,.12); }
    html[data-theme="light"] .brand,
    html[data-theme="light"] .nav-links,
    html[data-theme="light"] h1,
    html[data-theme="light"] h2,
    html[data-theme="light"] h3,
    html[data-theme="light"] label,
    html[data-theme="light"] .card strong,
    html[data-theme="light"] .benefit strong,
    html[data-theme="light"] .service-card strong,
    html[data-theme="light"] .workflow-card strong { color: #111827; }

    html[data-theme="light"] p,
    html[data-theme="light"] .footer,
    html[data-theme="light"] .session-status,
    html[data-theme="light"] .account-status,
    html[data-theme="light"] .card p,
    html[data-theme="light"] .benefit p,
    html[data-theme="light"] .service-card p,
    html[data-theme="light"] .workflow-card p,
    html[data-theme="light"] .list li,
    html[data-theme="light"] .form-note,
    html[data-theme="light"] .estimate-list li { color: #5f5148; }

    html[data-theme="light"] .hero-card,
    html[data-theme="light"] .portal-hero,
    html[data-theme="light"] .dashboard-hero,
    html[data-theme="light"] .card,
    html[data-theme="light"] .benefit,
    html[data-theme="light"] .login-card,
    html[data-theme="light"] .notice,
    html[data-theme="light"] .service-card,
    html[data-theme="light"] .workflow-card,
    html[data-theme="light"] .estimate-shell,
    html[data-theme="light"] .estimate-form {
      color: #111827;
      border-color: rgba(17,17,17,.12);
      background: rgba(255,255,255,.88);
      box-shadow: 0 22px 60px rgba(45,27,13,.12);
    }

    @media (max-width: 980px) {
      .hero,
      .hero-card,
      .portal-hero,
      .dashboard-hero { grid-template-columns: 1fr; }
    }


    /* Shared polished top-right navigation controls */
    .nav-links {
      gap: 8px;
      align-items: center;
    }

    .nav-links > a:not(.btn),
    .nav-links > button:not(.btn) {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 13px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 999px;
      color: #e2e8f0;
      background: rgba(255,255,255,.07);
      font: inherit;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .nav-links .btn {
      min-height: 38px;
      padding: 0 15px;
      border-radius: 999px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 12px 28px rgba(0,0,0,.18);
    }

    .nav-links .btn-primary {
      color: #21120a;
      background: linear-gradient(135deg, #fb923c, #facc15);
      border-color: transparent;
    }

    .nav-links .btn-soft,
    .nav-links .btn-secondary,
    .nav-links .btn:not(.btn-primary) {
      color: #f8fafc;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border-color: rgba(255,255,255,.16);
    }

    .nav-links > a:not(.btn):hover,
    .nav-links > button:not(.btn):hover,
    .nav-links .btn:hover,
    .nav-links > a:not(.btn):focus-visible,
    .nav-links > button:not(.btn):focus-visible,
    .nav-links .btn:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(251,146,60,.42);
      background: rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 16px 34px rgba(0,0,0,.24);
    }

    .nav-links .account-status,
    .nav-links [data-inventory-account-status] {
      min-height: 30px;
      max-width: min(52vw, 240px);
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      color: #cbd5e1;
      background: rgba(15,23,42,.46);
      font-size: .74rem;
      font-weight: 820;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-links [data-inventory-logout],
    .account-session-row [data-logout-button] {
      min-height: 30px;
      padding: 0 10px;
      font-size: .74rem;
      font-weight: 900;
    }

    html[data-theme="light"] .nav-links > a:not(.btn),
    html[data-theme="light"] .nav-links > button:not(.btn) {
      color: #1f2937;
      border-color: rgba(17,24,39,.14);
      background: rgba(255,255,255,.82);
    }

    html[data-theme="light"] .nav-links .btn-primary {
      color: #21120a;
      background: linear-gradient(135deg, #fb923c, #facc15);
      border-color: transparent;
    }

    html[data-theme="light"] .nav-links .btn-soft,
    html[data-theme="light"] .nav-links .btn-secondary,
    html[data-theme="light"] .nav-links .btn:not(.btn-primary),
    html[data-theme="light"] .nav-links [data-inventory-logout] {
      color: #111827;
      border-color: rgba(17,24,39,.16);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,247,237,.9));
      box-shadow: 0 10px 24px rgba(45,27,13,.09);
    }

    html[data-theme="light"] .nav-links .account-status,
    html[data-theme="light"] .nav-links [data-inventory-account-status] {
      color: #344054;
      border-color: rgba(17,24,39,.14);
      background: rgba(255,255,255,.88);
    }

  </style>
  <link rel="stylesheet" href="/assets/header-phase10.css">
</head>
<body>
  <nav class="nav" aria-label="Inventory navigation">
    <div class="wrap nav-inner">
      <a class="brand" href="/dashboard/"><img src="https://github.com/UG-BadCompany/images/blob/main/website%20logos/logo3.png?raw=true" alt="T&A Contracting logo"><span>Inventory</span></a>
      <div class="nav-links"><a class="btn" href="/dashboard/">Back to dashboard</a><span class="account-status" data-inventory-account-status role="status" aria-live="polite">Checking session…</span><button class="btn" type="button" data-inventory-logout hidden>Sign out</button></div>
    </div>
  </nav>
  <main class="wrap">
    <section class="hero">
      <div class="hero-card">
        <div><span class="eyebrow">Admin operations</span><h1>Inventory control</h1><p>Track materials, tools, stock levels, suppliers, and low-stock reorder needs away from the main dashboard workspace.</p></div>
        <div><p class="status" data-admin-inventory-status role="status" aria-live="polite">Checking inventory access…</p></div>
      </div>
    </section>
    <section class="grid" data-admin-inventory-summary aria-label="Inventory summary"></section>
    <section class="card" data-inventory-workspace hidden>
      <strong>Add inventory item</strong>
      <form class="form" data-admin-inventory-form>
        <div class="form-grid">
          <label>Item name<input name="name" required placeholder="Drywall screws"></label>
          <label>SKU / reference<input name="sku" placeholder="DW-SCREW-1"></label>
          <label>Category<input name="category" placeholder="Fasteners, paint, tools"></label>
          <label>Unit<input name="unit" placeholder="each, box, gallon"></label>
          <label>Quantity on hand<input name="quantityOnHand" type="number" step="0.01" placeholder="10"></label>
          <label>Reorder point<input name="reorderPoint" type="number" step="0.01" placeholder="3"></label>
          <label>Supplier<input name="supplier" placeholder="Supplier or store"></label>
          <label>Location<input name="storageLocation" placeholder="Shop shelf, truck, trailer"></label>
          <label class="full">Notes<textarea name="notes" placeholder="Size, color, preferred brand, purchase notes"></textarea></label>
        </div>
        <div class="actions"><button class="btn btn-primary" type="submit">Add item</button><span data-admin-inventory-form-status aria-live="polite"></span></div>
      </form>
    </section>
    <section class="inventory-list" data-admin-inventory-list aria-label="Inventory items"></section>
  </main>
  <script>
    const escapeHtml = (value = '') => String(value).replace(/[&<>'"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
    let currentAdminInventory = [];

    const renderAdminInventorySummary = (summary = {}) => `
      <article class="card"><span class="badge">Inventory items</span><div class="metric">${Number(summary.total || 0)}</div><p>active tracked items</p></article>
      <article class="card"><span class="badge">Low stock</span><div class="metric">${Number(summary.lowStock || 0)}</div><p>at or under reorder point</p></article>
      <article class="card"><span class="badge">Categories</span><div class="metric">${Number(summary.categories || 0)}</div><p>organized item groups</p></article>
    `;

    const renderAdminInventoryCard = (item) => `
      <article class="inventory-card">
        <span class="badge">${escapeHtml(item.stockStatus === 'low' ? 'low stock' : 'in stock')}</span>
        <strong>${escapeHtml(item.name)} — ${Number(item.quantityOnHand || 0)} ${escapeHtml(item.unit || 'each')}</strong>
        <div class="meta"><span>${escapeHtml(item.category || 'Uncategorized')}</span><span>${escapeHtml(item.sku || 'No SKU')}</span><span>${escapeHtml(item.storageLocation || 'No location')}</span><span>Reorder at ${Number(item.reorderPoint || 0)}</span></div>
        ${item.supplier ? `<p><strong>Supplier:</strong> ${escapeHtml(item.supplier)}</p>` : ''}
        ${item.notes ? `<p>${escapeHtml(item.notes)}</p>` : ''}
        <form class="form" data-admin-inventory-edit-form data-inventory-item-id="${escapeHtml(item.id)}">
          <input type="hidden" name="action" value="update">
          <div class="form-grid">
            <label>Item name<input name="name" required value="${escapeHtml(item.name)}"></label>
            <label>SKU / reference<input name="sku" value="${escapeHtml(item.sku || '')}"></label>
            <label>Category<input name="category" value="${escapeHtml(item.category || '')}"></label>
            <label>Unit<input name="unit" value="${escapeHtml(item.unit || 'each')}"></label>
            <label>Reorder point<input name="reorderPoint" type="number" step="0.01" value="${Number(item.reorderPoint || 0)}"></label>
            <label>Supplier<input name="supplier" value="${escapeHtml(item.supplier || '')}"></label>
            <label>Location<input name="storageLocation" value="${escapeHtml(item.storageLocation || '')}"></label>
            <label class="full">Notes<textarea name="notes">${escapeHtml(item.notes || '')}</textarea></label>
          </div>
          <div class="actions"><button class="btn" type="submit">Save item details</button><button class="btn btn-danger" type="button" data-admin-inventory-archive data-inventory-item-id="${escapeHtml(item.id)}">Archive item</button><span data-admin-inventory-edit-status aria-live="polite"></span></div>
        </form>
        <form class="form" data-admin-inventory-adjust-form data-inventory-item-id="${escapeHtml(item.id)}">
          <div class="form-grid"><label>Adjustment type<select name="adjustmentType"><option value="received">Received</option><option value="used">Used</option><option value="correction">Correction</option><option value="manual">Manual</option></select></label><label>Quantity change<input name="quantityDelta" type="number" step="0.01" placeholder="5 or -2" required></label><label class="full">Note<input name="adjustmentNote" placeholder="Restocked, used on job, count correction"></label></div>
          <div class="actions"><button class="btn" type="submit">Save adjustment</button><span data-admin-inventory-adjust-status aria-live="polite"></span></div>
        </form>
      </article>
    `;

    const renderAdminInventoryList = () => {
      const list = document.querySelector('[data-admin-inventory-list]');
      if (!list) return;
      list.innerHTML = currentAdminInventory.length ? currentAdminInventory.map(renderAdminInventoryCard).join('') : '<p class="status">No inventory items yet.</p>';
    };

    const bindAdminInventoryActions = () => {
      const workspace = document.querySelector('[data-inventory-workspace]');
      const form = document.querySelector('[data-admin-inventory-form]');
      if (!workspace || workspace.dataset.bound) return;
      workspace.dataset.bound = 'true';
      form?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const status = document.querySelector('[data-admin-inventory-form-status]');
        const payload = Object.fromEntries(new FormData(form).entries());
        if (status) status.textContent = 'Adding item…';
        try {
          const response = await fetch('/api/admin/inventory', { method: 'POST', headers: { accept: 'application/json', 'content-type': 'application/json' }, body: JSON.stringify(payload) });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.ok) throw new Error(result.message || 'Could not add inventory item.');
          form.reset();
          if (status) status.textContent = 'Inventory item added.';
          await loadAdminInventory();
        } catch (error) {
          if (status) status.textContent = error.message;
        }
      });
      document.querySelector('[data-admin-inventory-list]')?.addEventListener('submit', async (event) => {
        const editForm = event.target.closest('[data-admin-inventory-edit-form]');
        const adjustmentForm = event.target.closest('[data-admin-inventory-adjust-form]');
        if (!editForm && !adjustmentForm) return;
        event.preventDefault();
        const activeForm = editForm || adjustmentForm;
        const status = activeForm.querySelector(editForm ? '[data-admin-inventory-edit-status]' : '[data-admin-inventory-adjust-status]');
        const formData = new FormData(activeForm);
        const payload = editForm
          ? { ...Object.fromEntries(formData.entries()), itemId: editForm.dataset.inventoryItemId }
          : { itemId: adjustmentForm.dataset.inventoryItemId, adjustmentType: formData.get('adjustmentType'), quantityDelta: Number(formData.get('quantityDelta') || 0), adjustmentNote: formData.get('adjustmentNote') || '' };
        if (status) status.textContent = editForm ? 'Saving item details…' : 'Saving adjustment…';
        try {
          const response = await fetch('/api/admin/inventory', { method: 'PATCH', headers: { accept: 'application/json', 'content-type': 'application/json' }, body: JSON.stringify(payload) });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.ok) throw new Error(result.message || (editForm ? 'Could not save item details.' : 'Could not save inventory adjustment.'));
          await loadAdminInventory();
        } catch (error) {
          if (status) status.textContent = error.message;
        }
      });
      document.querySelector('[data-admin-inventory-list]')?.addEventListener('click', async (event) => {
        const archiveButton = event.target.closest('[data-admin-inventory-archive]');
        if (!archiveButton) return;
        const card = archiveButton.closest('.inventory-card');
        const status = card?.querySelector('[data-admin-inventory-edit-status]');
        if (status) status.textContent = 'Archiving item…';
        try {
          const response = await fetch('/api/admin/inventory', { method: 'PATCH', headers: { accept: 'application/json', 'content-type': 'application/json' }, body: JSON.stringify({ action: 'archive', itemId: archiveButton.dataset.inventoryItemId }) });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.ok) throw new Error(result.message || 'Could not archive inventory item.');
          await loadAdminInventory();
        } catch (error) {
          if (status) status.textContent = error.message;
        }
      });
    };

    const loadAdminInventory = async () => {
      const status = document.querySelector('[data-admin-inventory-status]');
      const summary = document.querySelector('[data-admin-inventory-summary]');
      try {
        const response = await fetch('/api/admin/inventory', { headers: { accept: 'application/json' } });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok) throw new Error(result.message || 'Inventory is not available.');
        currentAdminInventory = result.items || [];
        if (status) status.textContent = currentAdminInventory.length ? `${currentAdminInventory.length} inventory item${currentAdminInventory.length === 1 ? '' : 's'} loaded.` : 'No inventory items yet.';
        if (summary) summary.innerHTML = renderAdminInventorySummary(result.summary || {});
        document.querySelector('[data-inventory-workspace]')?.removeAttribute('hidden');
        renderAdminInventoryList();
        bindAdminInventoryActions();
      } catch (error) {
        currentAdminInventory = [];
        if (status) status.textContent = error.message;
      }
    };

    const bindInventoryLogout = () => {
      const logoutButton = document.querySelector('[data-inventory-logout]');
      if (!logoutButton || logoutButton.dataset.bound) return;
      logoutButton.dataset.bound = 'true';
      logoutButton.addEventListener('click', async () => {
        logoutButton.disabled = true;
        try {
          await fetch('/api/auth/logout', { method: 'POST', headers: { accept: 'application/json' } });
        } finally {
          window.location.href = '/login/?signed-out=1';
        }
      });
    };

    const requireInventoryAccess = async () => {
      const status = document.querySelector('[data-admin-inventory-status]');
      const accountStatus = document.querySelector('[data-inventory-account-status]');
      const logoutButton = document.querySelector('[data-inventory-logout]');
      try {
        const response = await fetch('/api/me', { headers: { accept: 'application/json' } });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.authenticated) throw new Error('Sign in with an admin account to manage inventory.');
        if (!result.user?.permissions?.canManageInventory) throw new Error('Admin inventory permission required.');
        if (accountStatus) accountStatus.textContent = `Signed in as ${result.user.fullName || result.user.email}`;
        if (logoutButton) logoutButton.hidden = false;
        bindInventoryLogout();
        await loadAdminInventory();
      } catch (error) {
        if (status) status.textContent = error.message;
        if (accountStatus) accountStatus.textContent = 'Inventory access unavailable';
      }
    };

    requireInventoryAccess();
  </script>
  <script src="/assets/site-cleanup.js" defer></script>
</body>
</html>
