# Add these to netlify.toml

[[redirects]]
  from = "/api/auth/magic-link"
  to = "/.netlify/functions/auth-magic-link"
  status = 200

[[redirects]]
  from = "/api/me"
  to = "/.netlify/functions/me"
  status = 200

[[redirects]]
  from = "/api/logout"
  to = "/.netlify/functions/logout"
  status = 200

[[redirects]]
  from = "/api/job-requests"
  to = "/.netlify/functions/job-requests"
  status = 200
