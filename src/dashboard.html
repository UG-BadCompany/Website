<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" href="/style.css"><script>document.documentElement.style.visibility='hidden';fetch('/api/install-status').then(r=>r.json()).then(s=>{if(s.needsInstall) location.replace('/install/'); else document.documentElement.style.visibility='visible'}).catch(()=>location.replace('/install/'));</script></head><body><div class="dash"><aside class="side"><h2 id="brand">Platform</h2><nav id="sidebar"></nav><hr><a href="?module=system-center">System Center</a><a href="?impersonate=demo-client">Impersonate Test User</a></aside><main class="main"><div class="row"><h1 id="title">Welcome to Your New Business Platform</h1><span class="pill">Super Owner</span><select id="workspace"><option>Owner Workspace</option><option>Admin View</option><option>Manager View</option><option>Worker View</option><option>Client View</option></select></div><section id="content"></section></main></div><nav class="mobile" id="mobile"></nav><script>
function emptyState(title, action){return `<div class="empty"><h2>${title}</h2><p>This area is ready, but nothing has been created yet. Use the action below to create the first record or read the help guide.</p><button class="primary">${action}</button> <a href="/dashboard/?module=system-help">Help guide</a></div>`}
function onboarding(data){return `<h2>Welcome to Your New Business Platform</h2><div class="cards"><section class="smallcard"><h3>Quick Start Checklist</h3>${['Upload Logo','Confirm Services','Configure Email','Configure AI','Configure Payments','Add Employee','Add Client','Create Request','Create Quote','Create Work Order','Publish Homepage'].map(x=>`<label><input type="checkbox"> ${x}</label><br>`).join('')}</section><section class="smallcard"><h3>Setup Progress</h3><p>${data.setupProgress}% complete</p><div class="progress"><div class="bar" style="width:${data.setupProgress}%"></div></div></section><section class="smallcard"><h3>Business Health</h3><p>🟢 Core platform installed</p><p>🟡 Email, AI, and payments are optional and not configured.</p></section><section class="smallcard"><h3>Recommended Actions</h3><p>Start with services, email, an employee, and your first quote.</p><a class="button primary" href="?module=system-center">Open System Center</a><a class="button secondary" href="/">View Homepage</a></section></div><h2>Active Work</h2>${emptyState('No Work Orders Yet','Create Work Order')}`}
async function boot(){ const data=await fetch('/api/dashboard-bootstrap').then(r=>r.json()); document.documentElement.style.setProperty('--primary', data.theme.primary || '#2563eb'); document.documentElement.style.setProperty('--accent', data.theme.accent || '#14b8a6'); document.documentElement.style.setProperty('--sidebar', data.theme.sidebarBackground || '#111827'); document.documentElement.style.setProperty('--sidebarText', data.theme.sidebarText || '#f9fafb'); document.getElementById('brand').textContent=data.company.name; const params=new URLSearchParams(location.search); const moduleId=params.get('module'); const impersonating=params.get('impersonate'); if(impersonating) document.querySelector('.main').insertAdjacentHTML('afterbegin','<div class="warning">Impersonating demo-client. This action is audit logged.</div>'); const mods=data.modules||[]; sidebar.innerHTML=mods.map(m=>`<a class="${m.id===moduleId?'active':''}" href="?module=${m.id}">${m.icon} ${m.name}</a>`).join(''); mobile.innerHTML=(data.mobileNav||[]).map(m=>`<a href="?module=${m.id}">${m.icon}<br>${m.label}</a>`).join(''); if(!moduleId){content.innerHTML=onboarding(data); return;} const mod=mods.find(m=>m.id===moduleId); title.textContent=mod?mod.name:'System Center'; if(moduleId==='system-center'){content.innerHTML=`<div class="cards"><section class="smallcard"><h2>Environment & Integrations</h2><p>Configure OpenAI, Resend, Square, SMTP, SerpAPI, reCAPTCHA, Google Maps, and license validation after install. None are required for installation.</p><a href="?module=platform-health">Open Platform Health</a></section><section class="smallcard"><h2>Platform Health</h2><p>🟢 Database fallback</p><p>🟢 Netlify Functions</p><p>🟢 Module Registry</p><button class="primary">Run Diagnostics</button></section><section class="smallcard"><h2>Audit Log</h2><p>Installer completion and impersonation actions are tracked.</p></section></div>`; return;} content.innerHTML=emptyState(`${mod?.name||'Module'} Ready`, `Create ${mod?.name||'Record'}`); }
boot().catch(()=>location.replace('/install/'));
</script></body></html>
