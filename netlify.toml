[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/install-status"
  to = "/.netlify/functions/install-status"
  status = 200
[[redirects]]
  from = "/api/install/health"
  to = "/.netlify/functions/install-health"
  status = 200
[[redirects]]
  from = "/api/install/draft"
  to = "/.netlify/functions/install-draft"
  status = 200
[[redirects]]
  from = "/api/install/finish"
  to = "/.netlify/functions/install-finish"
  status = 200
[[redirects]]
  from = "/config/bootstrap.json"
  to = "/.netlify/functions/config-bootstrap"
  status = 200
[[redirects]]
  from = "/api/module/:module/:action"
  to = "/.netlify/functions/module-api?module=:module&action=:action"
  status = 200
[[redirects]]
  from = "/api/system/:action"
  to = "/.netlify/functions/system?action=:action"
  status = 200
[[redirects]]
  from = "/install/recovery"
  to = "/install/recovery/index.html"
  status = 200
[[redirects]]
  from = "/install/*"
  to = "/install/index.html"
  status = 200
[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/index.html"
  status = 200
[[redirects]]
  from = "/config/*"
  to = "/config/:splat"
  status = 200
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
