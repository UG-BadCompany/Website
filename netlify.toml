[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

# Explicit API route mappings for Netlify Functions.

[[redirects]]
  from = "/api/job-requests"
  to = "/.netlify/functions/create-job-request"
  status = 200

[[redirects]]
  from = "/api/auth/magic-link"
