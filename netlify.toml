[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"


# API route mappings for Netlify Functions.
# These make local/dev/prod routing explicit even when function path config is not picked up.

[[redirects]]
  from = "/api/job-requests"
  to = "/.netlify/functions/create-job-request"
  status = 200

[[redirects]]
  from = "/api/auth/magic-link"
  to = "/.netlify/functions/request-magic-link"
  status = 200

[[redirects]]
  from = "/api/me"
  to = "/.netlify/functions/me"
  status = 200

[[redirects]]
  from = "/api/logout"
  to = "/.netlify/functions/logout"
  status = 200

[[redirects]]
  from = "/api/admin/quote-draft"
  to = "/.netlify/functions/admin-quote-draft"
  status = 200

[[redirects]]
  from = "/api/admin/job-requests"
  to = "/.netlify/functions/admin-job-requests"
  status = 200

# API route mappings for Netlify Functions.

[[redirects]]
  from = "/api/admin/quotes"
  to = "/.netlify/functions/admin-quotes"
  status = 200

[[redirects]]
  from = "/api/client/quotes"
  to = "/.netlify/functions/client-quotes"
  status = 200

[[redirects]]
  from = "/api/client/job-requests"
  to = "/.netlify/functions/client-job-requests"
  status = 200
