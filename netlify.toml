[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/api/install-status"
  to = "/.netlify/functions/install-status"
  status = 200

[[redirects]]
  from = "/api/install/*"
  to = "/.netlify/functions/install"
  status = 200

[[redirects]]
  from = "/api/env/*"
  to = "/.netlify/functions/env"
  status = 200

[[redirects]]
  from = "/api/dashboard-bootstrap"
  to = "/.netlify/functions/dashboard-bootstrap"
  status = 200

[[redirects]]
  from = "/api/modules/*"
  to = "/.netlify/functions/module-api"
  status = 200

[[redirects]]
  from = "/api/workflow/*"
  to = "/.netlify/functions/workflow"
  status = 200

[[redirects]]
  from = "/api/ai/*"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/system/*"
  to = "/.netlify/functions/system"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/install/*"
  to = "/install/index.html"
  status = 200

[[redirects]]
  from = "/portal/*"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/client/*"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/login/*"
  to = "/login/index.html"
  status = 200

[[redirects]]
  from = "/quote/*"
  to = "/quote/index.html"
  status = 200

[[redirects]]
  from = "/invoice/*"
  to = "/invoice/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/manager/*"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/worker/*"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/request-estimate/*"
  to = "/index.html"
  status = 200
