[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/api/install-status"
  to = "/.netlify/functions/install-status"
  status = 200

[[redirects]]
  from = "/api/install/env-status"
  to = "/.netlify/functions/install-env-status"
  status = 200

[[redirects]]
  from = "/api/install/env"
  to = "/.netlify/functions/install-env"
  status = 200

[[redirects]]
  from = "/api/install"
  to = "/.netlify/functions/install"
  status = 200

[[redirects]]
  from = "/api/dashboard-bootstrap"
  to = "/.netlify/functions/dashboard-bootstrap"
  status = 200

[[redirects]]
  from = "/api/modules/*"
  to = "/.netlify/functions/module-api"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
