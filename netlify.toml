[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/api/install-status"
  to = "/.netlify/functions/install-status"
  status = 200

[[redirects]]
  from = "/api/install/*"
  to = "/.netlify/functions/install"
  status = 200

[[redirects]]
  from = "/api/dashboard-bootstrap"
  to = "/.netlify/functions/dashboard-bootstrap"
  status = 200

[[redirects]]
  from = "/api/public-config"
  to = "/.netlify/functions/public-config"
  status = 200

[[redirects]]
  from = "/api/modules/*"
  to = "/.netlify/functions/module-api"
  status = 200

[[redirects]]
  from = "/api/workflow/*"
  to = "/.netlify/functions/workflow"
  status = 200

[[redirects]]
  from = "/api/payments/square/webhook"
  to = "/.netlify/functions/square-webhook"
  status = 200

[[redirects]]
  from = "/install/recovery"
  to = "/install/recovery/index.html"
  status = 200

[[redirects]]
  from = "/install/*"
  to = "/install/index.html"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/portal/*"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/client/*"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/login/*"
  to = "/login/index.html"
  status = 200

[[redirects]]
  from = "/request-estimate/*"
  to = "/request-estimate/index.html"
  status = 200

[[redirects]]
  from = "/quote/*"
  to = "/quote/index.html"
  status = 200

[[redirects]]
  from = "/invoice/*"
  to = "/invoice/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
