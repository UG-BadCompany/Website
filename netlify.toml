[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/api/install-status"
  to = "/.netlify/functions/install-status"
  status = 200

[[redirects]]
  from = "/api/install/finish"
  to = "/.netlify/functions/install-finish"
  status = 200

[[redirects]]
  from = "/api/install/draft"
  to = "/.netlify/functions/install-draft"
  status = 200

[[redirects]]
  from = "/api/install/env-status"
  to = "/.netlify/functions/env-status"
  status = 200

[[redirects]]
  from = "/api/install/env"
  to = "/.netlify/functions/env-save"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/modules/*"
  to = "/.netlify/functions/modules-dispatch/:splat"
  status = 200

[[redirects]]
  from = "/api/workflow"
  to = "/.netlify/functions/workflow"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
