[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/api/install-status"
  to = "/.netlify/functions/install-status"
  status = 200

[[redirects]]
  from = "/api/install/health"
  to = "/.netlify/functions/install-health"
  status = 200

[[redirects]]
  from = "/api/install/draft"
  to = "/.netlify/functions/install-draft"
  status = 200

[[redirects]]
  from = "/api/install/finish"
  to = "/.netlify/functions/install-finish"
  status = 200

[[redirects]]
  from = "/api/modules/*"
  to = "/.netlify/functions/module-api/:splat"
  status = 200

[[redirects]]
  from = "/api/dashboard-bootstrap"
  to = "/.netlify/functions/dashboard-bootstrap"
  status = 200

[[redirects]]
  from = "/install/*"
  to = "/install/index.html"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
