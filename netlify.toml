[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/job-requests"
  to = "/.netlify/functions/job-requests"
  status = 200

[[redirects]]
  from = "/api/ai-quote-draft"
  to = "/.netlify/functions/ai-quote-draft"
  status = 200

[[redirects]]
  from = "/api/ai-quote-drafts"
  to = "/.netlify/functions/ai-quote-drafts"
  status = 200

[[redirects]]
  from = "/api/me"
  to = "/.netlify/functions/me"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
