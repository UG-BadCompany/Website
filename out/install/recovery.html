<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Installation Recovery</title><link rel="stylesheet" href="/style.css"></head><body><main class="shell"><section class="card" id="app"><h1>Loading installer…</h1><p>If this message remains, open <a href="/api/install/health">installer health</a>.</p></section></main><script>
const steps = [
 ['welcome','Welcome','Set up the platform before any public business content is visible.'],
 ['company','Company','Add your company profile. This appears on the homepage, quotes, invoices, and portals.'],
 ['branding','Branding','Upload logo metadata and choose how your brand appears across the product.'],
 ['theme','Theme','Choose light, dark, system, or custom colors with live preview.'],
 ['owner','Owner Account','Create the platform Super Owner account.'],
 ['services','Services','Add trades or services customers can request.'],
 ['modules','Modules','Choose drop-in modules to enable at launch.'],
 ['homepage','Homepage','Set homepage basics. Advanced editing lives in Homepage Builder after install.'],
 ['review','Review','Confirm required setup and optional integrations.'],
 ['finish','Finish','Complete installation and open your dashboard.']
];
const moduleDefaults = ['estimate-quote-center','work-orders','schedule','invoices','customers','module-manager','homepage-editor','theme-manager'];
let draft = null, stepIndex = 0, saveTimer = null, autosaveStopped = false, lastSaveError = '';
const $ = (id)=>document.getElementById(id);
function debounceSave(){ if(autosaveStopped) return; clearTimeout(saveTimer); saveTimer=setTimeout(()=>saveDraft(true), 1000); }
function currentStep(){ return steps[stepIndex][0]; }
function setStep(id){ stepIndex = Math.max(0, steps.findIndex(s=>s[0]===id)); draft.currentStep=currentStep(); render(); debounceSave(); }
function update(path, value){ const [a,b]=path.split('.'); if(b){ draft[a]=draft[a]||{}; draft[a][b]=value; } else draft[a]=value; debounceSave(); render(false); }
async function api(url, opts={}){ const res = await fetch(url, {headers:{'Content-Type':'application/json'}, ...opts}); const text = await res.text(); let data; try{ data=JSON.parse(text); }catch{ throw new Error('Expected JSON from '+url); } if(!res.ok || data.ok===false) throw Object.assign(new Error(data.message||'Request failed'), {data}); return data; }
async function saveDraft(auto=false){ try{ lastSaveError=''; draft.currentStep=currentStep(); await api('/api/install/draft',{method:'POST',body:JSON.stringify({draft})}); $('saveStatus') && ($('saveStatus').textContent = auto ? 'Autosaved' : 'Saved'); }catch(e){ lastSaveError=e.message; if(auto) autosaveStopped=true; render(); } }
async function finishInstall(){ await saveDraft(false).catch(()=>{}); try{ const data=await api('/api/install/finish',{method:'POST',body:JSON.stringify({draft})}); location.href=data.redirectTo || '/dashboard/'; }catch(e){ const missing = e.data?.missing || []; const go = e.data?.goToStep; $('finishResult').innerHTML = `<div class="error"><strong>${e.data?.message||'Installation could not finish.'}</strong><ul>${missing.map(m=>`<li>${m}</li>`).join('')}</ul>${missing.length?`<button class="secondary" onclick="setStep('${go||'review'}')">Fix ${missing[0]}</button>`:''}</div>`; } }
function stepNav(){ return `<div class="progress"><div class="bar" style="width:${((stepIndex+1)/steps.length)*100}%"></div></div><div class="steps">${steps.map((s,i)=>`<button class="pill ${i===stepIndex?'active':''}" onclick="setStep('${s[0]}')">${i+1}. ${s[1]}</button>`).join('')}</div>`; }
function textField(label,path,required=false,type='text'){ const [a,b]=path.split('.'); const val=(b?draft[a]?.[b]:draft[a])||''; return `<label>${label}${required?' *':''}<input ${required?'required':''} type="${type}" value="${String(val).replaceAll('"','&quot;')}" oninput="update('${path}', this.value)"></label>`; }
function color(label,path,def){ const [a,b]=path.split('.'); const val=draft[a]?.[b]||def; return `<label>${label}<span class="row"><input aria-label="${label}" type="color" value="${val}" oninput="update('${path}', this.value)" style="width:70px;padding:4px"><input value="${val}" pattern="^#[0-9a-fA-F]{6}$" oninput="update('${path}', this.value)"><button class="secondary" onclick="update('${path}','${def}')">Reset</button></span></label>`; }
function missingRequired(){ const miss=[]; if(!draft.company?.name) miss.push(['Company profile','company']); if(!draft.owner?.name||!draft.owner?.email) miss.push(['Owner account','owner']); if(!['light','dark','system','custom'].includes(draft.theme?.mode)) miss.push(['Theme','theme']); if(!draft.homepage?.headline) miss.push(['Homepage basics','homepage']); if(!draft.services?.length) miss.push(['Services','services']); if(!draft.modules?.length) miss.push(['Modules','modules']); return miss; }
function body(){ const id=currentStep(); if(id==='welcome') return `<h2>Welcome</h2><p>Fresh deployments stay locked until setup is complete. Optional integrations can be configured later in Owner → System Center → Environment & Integrations.</p>`;
 if(id==='company') return `<div class="fields">${textField('Company Name','company.name',true)}${textField('Business Type','company.businessType')}${textField('Domain','company.domain')}</div>`;
 if(id==='branding') return `<div class="fields">${textField('Logo URL or file metadata','branding.logoUrl')}${textField('Favicon URL','branding.faviconUrl')}<p class="help">You can upload and manage real files later in System Center → File Manager.</p></div>`;
 if(id==='theme') return `<div class="fields"><label>Mode<select onchange="update('theme.mode',this.value)">${['system','light','dark','custom'].map(m=>`<option value="${m}" ${draft.theme?.mode===m?'selected':''}>${m[0].toUpperCase()+m.slice(1)}</option>`).join('')}</select></label>${color('Primary Color','theme.primary','#2563eb')}${color('Accent Color','theme.accent','#14b8a6')}${color('Background Color','theme.background','#f8fafc')}${color('Surface Color','theme.surface','#ffffff')}${color('Text Color','theme.text','#0f172a')}<label><input type="checkbox" ${draft.theme?.customSidebar?'checked':''} onchange="update('theme.customSidebar',this.checked)"> Use custom sidebar colors</label>${draft.theme?.customSidebar?color('Sidebar Background','theme.sidebarBackground','#111827')+color('Sidebar Text','theme.sidebarText','#f9fafb'):''}<div class="preview"><div class="previewHead">Dashboard Sidebar</div><div class="previewBody"><button class="primary">Sample button</button><input placeholder="Sample input"><p>Live preview updates as you change colors.</p></div></div></div>`;
 if(id==='owner') return `<div class="fields">${textField('Owner Name','owner.name',true)}${textField('Owner Email','owner.email',true,'email')}<p class="help">Owner is a Super User with all workspaces, hidden/beta module access, view switching, workflow testing, and audited impersonation.</p></div>`;
 if(id==='services') return `<label>Services / Trades *<textarea rows="7" oninput="update('services', this.value.split('\\n').map(s=>s.trim()).filter(Boolean))">${(draft.services||[]).join('\n')}</textarea></label><p class="help">One service per line.</p>`;
 if(id==='modules') return `<p>Select launch modules. New modules are discovered from manifests without router/sidebar edits.</p><div class="fields">${moduleDefaults.map(m=>`<label><input type="checkbox" ${draft.modules?.includes(m)?'checked':''} onchange="this.checked?draft.modules=[...(draft.modules||[]),'${m}']:draft.modules=(draft.modules||[]).filter(x=>x!=='${m}'); debounceSave(); render(false)"> ${m}</label>`).join('')}</div>`;
 if(id==='homepage') return `<div class="fields">${textField('Homepage Headline','homepage.headline',true)}${textField('Homepage Subheadline','homepage.subheadline')}<label>CTA Text<input value="${draft.homepage?.ctaText||'Request Estimate'}" oninput="update('homepage.ctaText',this.value)"></label></div>`;
 if(id==='review') { const miss=missingRequired(); return `<h2>Required checklist</h2><ul>${['Company profile','Branding','Theme','Owner account','Services','Modules','Homepage basics'].map(x=>`<li>${miss.some(m=>x.startsWith(m[0].split(' ')[0]))?'□':'✓'} ${x}</li>`).join('')}</ul><h2>Optional integrations</h2><ul><li>○ Email not configured — configure later in System Center</li><li>○ AI not configured — configure later in System Center</li><li>○ Square not configured — manual payment tracking enabled</li><li>○ License validation disabled</li></ul>${miss.length?`<div class="warning">Missing required setup:<ul>${miss.map(m=>`<li>${m[0]} <button onclick="setStep('${m[1]}')">Go fix</button></li>`).join('')}</ul></div>`:'<p class="help">Required setup is complete. Finish Install is enabled even without optional integrations.</p>'}`; }
 return `<h2>Finish Install</h2><p>Finalization saves company profile, owner account, theme settings, homepage config, services, module registry, roles, permissions, audit log, and bootstrap status.</p><button class="primary" onclick="finishInstall()">Finish Install</button><div id="finishResult"></div>`; }
function render(replace=true){ if(!draft) return; const [id,title,explain]=steps[stepIndex]; const style=`--primary:${draft.theme?.primary||'#2563eb'};--accent:${draft.theme?.accent||'#14b8a6'};--bg:${draft.theme?.background||'#f8fafc'};--surface:${draft.theme?.surface||'#fff'};--text:${draft.theme?.text||'#0f172a'};--sidebar:${draft.theme?.sidebarBackground||'#111827'};--sidebarText:${draft.theme?.sidebarText||'#f9fafb'}`; document.documentElement.setAttribute('style',style); $('app').innerHTML=`<h1>First-Run Installer</h1>${stepNav()}<div class="grid"><div><h2>Step ${stepIndex+1} of 10 — ${title}</h2><p>${explain}</p>${body()}<div class="row" style="margin-top:18px"><button class="secondary" ${stepIndex===0?'disabled':''} onclick="setStep(steps[stepIndex-1][0])">Back</button><button class="primary" ${stepIndex===steps.length-1?'disabled':''} onclick="setStep(steps[stepIndex+1][0]); saveDraft(false)">Save & Continue</button><button class="secondary" onclick="saveDraft(false); autosaveStopped=false">Retry Save</button><span id="saveStatus">${lastSaveError?'Save error: '+lastSaveError:'Ready'}</span></div></div><aside class="help"><strong>Why this matters</strong><p>Installer lock prevents white pages, public data leaks, and half-configured business content.</p><p>Environment variables are optional and live in System Center after install.</p></aside></div>`; }
(async function boot(){ try{ await api('/api/install/health'); const data=await api('/api/install/draft'); draft=data.draft; if(!draft.modules?.length) draft.modules=[...moduleDefaults]; stepIndex=Math.max(0, steps.findIndex(s=>s[0]===draft.currentStep)); render(); }catch(e){ $('app').innerHTML=`<h1>Installer Recovery</h1><div class="error"><p>${e.message}</p><a href="/api/install/health">Check health JSON</a></div>`; } })();
</script></body></html>
