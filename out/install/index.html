<!doctype html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contractor Portal Setup</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/public.css">
  <link rel="stylesheet" href="/install/install.css">
</head>
<body class="installer-page public-auth-page">
  <main class="hero public-auth-hero installer-hero">
    <div class="container public-onboarding-wrap">
      <form id="install-form" class="card stack public-auth-card onboarding-card installer-card">
        <div class="brand auth-brand" data-brand></div>
        <span class="pill">Company setup</span>
        <div id="step-root"></div>
        <div class="grid grid-2 installer-actions">
          <button class="btn secondary" type="button" id="back">Back</button>
          <button class="btn" type="button" id="next">Start Setup</button>
        </div>
        <p id="install-status" class="notice subtle"></p>
      </form>
    </div>
  </main>
  <script src="/assets/js/api-client.js"></script>
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/company-settings.js"></script>
  <script src="/assets/js/form-utils.js"></script>
  <script src="/install/install.js"></script>
</body>
</html>
