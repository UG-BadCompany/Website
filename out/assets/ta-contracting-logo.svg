<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">T&amp;A Contracting</title>
  <desc id="desc">Clean modern T&amp;A Contracting logo with desert sun, roofline, bold T&amp;A wordmark, and Arizona Native tagline.</desc>
  <defs>
    <linearGradient id="copper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffb357"/>
      <stop offset="0.55" stop-color="#d86f2c"/>
      <stop offset="1" stop-color="#9c3518"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#2a1711"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1b100b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="52" fill="#fffaf2"/>
  <g filter="url(#softShadow)">
    <rect x="54" y="54" width="312" height="312" rx="42" fill="#ffffff"/>
    <circle cx="210" cy="176" r="82" fill="url(#copper)" opacity="0.95"/>
    <path d="M110 218 210 134l100 84" fill="none" stroke="#111827" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M131 240h158" stroke="#111827" stroke-width="22" stroke-linecap="round"/>
    <path d="M156 286h108" stroke="#d86f2c" stroke-width="20" stroke-linecap="round"/>
    <path d="M178 134 210 106l32 28" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <text x="420" y="174" font-family="Arial Black, Montserrat, system-ui, sans-serif" font-size="104" letter-spacing="-5" fill="url(#ink)">T&amp;A</text>
  <text x="420" y="256" font-family="Arial Black, Montserrat, system-ui, sans-serif" font-size="62" letter-spacing="9" fill="#111827">CONTRACTING</text>
  <rect x="422" y="287" width="428" height="5" rx="3" fill="url(#copper)"/>
  <text x="420" y="335" font-family="Inter, Montserrat, Arial, sans-serif" font-size="25" font-weight="900" letter-spacing="5" fill="#9c3518">ARIZONA NATIVE</text>
  <text x="704" y="335" font-family="Inter, Montserrat, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="4" fill="#374151">MAINTENANCE • ANYTHING • EVERYTHING</text>
</svg>
