<!doctype html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Account Setup · Client Portal</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/public.css">
</head>
<body class="public-auth-page account-setup-page">
  <header class="site-header premium-public-header customer-public-header">
    <div class="container nav">
      <a class="brand" href="/" data-brand aria-label="Company home"></a>
      <nav class="nav-links" aria-label="Account setup navigation">
        <a href="/login/">Login</a>
        <a class="btn secondary" href="/">Home</a>
      </nav>
    </div>
  </header>
  <main class="hero public-auth-hero">
    <div class="container public-onboarding-wrap">
      <form class="card stack public-auth-card onboarding-card" id="account-setup-form">
        <div class="brand auth-brand" data-brand></div>
        <span class="pill">First-time portal setup</span>
        <div>
          <h1>Finish setting up your client account.</h1>
          <p>Confirm your profile so requests, quotes, invoices, approvals, photos, and updates stay connected to one secure Client Workspace.</p>
        </div>
        <div class="form-grid">
          <label class="field"><span>Full name</span><input name="fullName" autocomplete="name" required></label>
          <label class="field"><span>Verified email</span><input name="email" type="email" autocomplete="email" readonly required></label>
          <label class="field"><span>Phone</span><input name="phone" autocomplete="tel" required></label>
          <label class="field"><span>Company <small>(optional)</small></span><input name="companyName" autocomplete="organization"></label>
          <label class="field wide"><span>Primary property address <small>(optional)</small></span><input name="propertyAddress" autocomplete="street-address"></label>
          <label class="field"><span>City</span><input name="city" autocomplete="address-level2"></label>
          <label class="field"><span>State</span><input name="state" autocomplete="address-level1"></label>
          <label class="field"><span>ZIP</span><input name="zip" autocomplete="postal-code"></label>
        </div>
        <label class="checkbox-line premium-checkbox"><input type="checkbox" name="acceptedTerms" required> I consent to create a client portal account for this email.</label>
        <div class="action-row">
          <button class="btn" type="submit">Create Client Account</button>
          <a class="btn secondary" href="/login/">Use another email</a>
        </div>
        <p id="account-setup-status" class="notice">Loading your verified email…</p>
      </form>
    </div>
  </main>
  <script src="/assets/js/api-client.js"></script>
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/company-settings.js"></script>
  <script src="/assets/js/auth-client.js"></script>
  <script src="/account-setup/setup.js"></script>
</body>
</html>
