<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Portal | T&A Contracting</title>
  <link rel="icon" href="https://raw.githubusercontent.com/UG-BadCompany/images/refs/heads/main/website%20logos/favicon/favicon.ico">
  <link rel="stylesheet" href="/assets/header-phase10.css">
  <style>
    :root { color-scheme: dark; --text:#f8fafc; --muted:#cbd5e1; --line:rgba(255,255,255,.16); }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif; color:var(--text); background:radial-gradient(circle at 12% -8%,rgba(249,115,22,.26),transparent 34rem),radial-gradient(circle at 92% 0%,rgba(96,165,250,.13),transparent 28rem),linear-gradient(135deg,#070a0f 0%,#111827 52%,#251109 100%); }
    .wrap { width:min(1120px,calc(100% - 32px)); margin:0 auto; }
    .nav-inner { display:flex; justify-content:space-between; align-items:center; padding:12px 0; }
    .nav-links { display:flex; gap:10px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:44px; padding:0 16px; border-radius:999px; border:1px solid rgba(255,255,255,.14); color:var(--text); text-decoration:none; font-weight:950; background:rgba(255,255,255,.08); }
    .btn-primary { color:#21120a; background:linear-gradient(135deg,#fb923c,#f59e0b); border-color:transparent; }
    main { min-height:calc(100vh - 92px); display:grid; place-items:center; padding:48px 0; }
    .panel { width:min(760px,100%); border:1px solid var(--line); border-radius:30px; padding:clamp(24px,5vw,46px); background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.055)); box-shadow:0 28px 90px rgba(0,0,0,.32); }
    .eyebrow { display:inline-flex; margin-bottom:12px; border-radius:999px; padding:7px 11px; background:rgba(249,115,22,.15); border:1px solid rgba(249,115,22,.32); color:#fed7aa; font-weight:950; letter-spacing:.08em; text-transform:uppercase; font-size:.76rem; }
    h1 { margin:0; font-size:clamp(2rem,5vw,4rem); letter-spacing:-.06em; line-height:.98; }
    p { color:var(--muted); line-height:1.7; font-weight:760; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
  </style>
  <link rel="stylesheet" href="/assets/public-phase13-dashboard-match.css">
  <link rel="stylesheet" href="/assets/dashboard-phase49-ui-consistency.css">
  <link rel="stylesheet" href="/assets/dashboard-phase50-real-white-area-fix.css">

<style>
/* Unified homepage/dashboard visual system */
:root{--dash-bg: #070a0f}
body{background:linear-gradient(135deg, #070a0f 0%, #111827 48%, #251109 100%)}
.nav {background: rgba(7,10,15,.80)}
/* Shared polished top-right navigation controls */
</style>
  <link rel="stylesheet" href="/assets/mobile-field-ux.css">
</head>
<body>
  <header class="nav" aria-label="Main navigation">
    <div class="wrap nav-inner">
      <a class="brand" href="/" aria-label="T&A Contracting home">
        <img src="https://github.com/UG-BadCompany/Website/blob/main/images/logo/logo3.png?raw=true" alt="T&A Contracting logo">
        <span>T&A Contracting</span>
      </a>
      <nav class="nav-links" aria-label="Primary links">
        <a class="btn" href="/">Home</a>
        <a class="btn btn-primary" href="/dashboard/?view=admin">Dashboard</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    <section class="panel">
      <span class="eyebrow">Admin Portal</span>
      <h1>Use the secure dashboard.</h1>
      <p>Admin tools now live inside the secure dashboard.</p>
      <p>This page now points to the real role-based dashboard so there are no unfinished duplicate portal pages.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/dashboard/?view=admin">Open Admin Dashboard</a>
        <a class="btn" href="/login/?next=dashboard">Request Login Link</a>
      </div>
    </section>
  </main>
</body>
</html>
